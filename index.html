<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flick</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface-2: #1c1c27;
      --surface-3: #222230;
      --border: rgba(255,255,255,0.06);
      --accent: #7c6fff;
      --accent-2: #38bdf8;
      --text: #f0f0f5;
      --muted: #8b8b9e;
      --green: #34d399;
      --red: #ff5e7d;
      --msg-out: #2d2a5e;
      --msg-in: #1c1c27;
    }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; }

    /* ── AUTH ── */
    #authScreen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .bg-grid {
      position: fixed; inset: 0; pointer-events: none;
      background-image: linear-gradient(rgba(124,111,255,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(56,189,248,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }
    .glow { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; }
    .glow-1 { width: 500px; height: 500px; background: rgba(124,111,255,.15); top: -120px; left: -150px; animation: drift 13s ease-in-out infinite alternate; }
    .glow-2 { width: 400px; height: 400px; background: rgba(56,189,248,.1); bottom: -100px; right: -100px; animation: drift 17s ease-in-out infinite alternate-reverse; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(40px,30px) scale(1.1); } }

    .auth-wrap { position: relative; z-index: 1; width: 100%; max-width: 400px; padding: 20px; animation: slideUp .5s cubic-bezier(.16,1,.3,1); }
    @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    .auth-brand { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 32px; }
    .auth-logo { width: 48px; height: 48px; border-radius: 14px; overflow: hidden; background: #000; box-shadow: 0 8px 28px rgba(124,111,255,.5); }
    .auth-logo img { width: 100%; height: 100%; object-fit: cover; }
    .auth-logo-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: flex; align-items: center; justify-content: center; }
    .auth-title { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -1px; background: linear-gradient(120deg, #fff 20%, #b49fff 55%, var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 28px; box-shadow: 0 24px 64px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05); }
    .tabs { display: flex; position: relative; background: var(--surface-2); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
    .tab { flex: 1; border: none; background: transparent; cursor: pointer; padding: 9px; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--muted); position: relative; z-index: 1; transition: color .2s; }
    .tab.active { color: var(--text); }
    .tab-ind { position: absolute; top: 4px; bottom: 4px; left: 4px; width: calc(50% - 4px); background: var(--surface); border-radius: 7px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,.3); transition: transform .3s cubic-bezier(.34,1.56,.64,1); }
    .tab-ind.r { transform: translateX(100%); }

    .form { display: none; flex-direction: column; gap: 16px; }
    .form.active { display: flex; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: .4px; text-transform: uppercase; }
    input[type=text], input[type=email], input[type=password] {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px;
      padding: 11px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
      outline: none; width: 100%; transition: border-color .2s, box-shadow .2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,111,255,.15); }
    input::placeholder { color: var(--muted); opacity: .5; }

    .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all .2s; position: relative; overflow: hidden; }
    .btn-primary { background: linear-gradient(120deg, var(--accent), #a78bfa 50%, var(--accent-2)); color: white; box-shadow: 0 8px 24px rgba(124,111,255,.4); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(124,111,255,.5); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .spin { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .auth-msg { padding: 10px 14px; border-radius: 10px; font-size: 13px; text-align: center; margin-top: 4px; display: none; }
    .auth-msg.err { background: rgba(255,94,125,.1); color: var(--red); border: 1px solid rgba(255,94,125,.2); display: block; }
    .auth-msg.ok { background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.2); display: block; }

    .strength-bar { height: 3px; background: var(--surface-2); border-radius: 99px; overflow: hidden; }
    .strength-fill { height: 100%; width: 0; border-radius: 99px; transition: width .3s, background .3s; }

    /* ── APP ── */
    #appScreen { display: none; height: 100vh; flex-direction: row; }
    #appScreen.show { display: flex; }

    /* Sidebar */
    .sidebar { width: 320px; min-width: 320px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .sidebar-header { padding: 20px 16px 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
    .s-logo { width: 32px; height: 32px; border-radius: 9px; overflow: hidden; background: #000; flex-shrink: 0; }
    .s-logo img { width: 100%; height: 100%; object-fit: cover; }
    .s-logo-ph { width: 100%; height: 100%; background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
    .s-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; background: linear-gradient(120deg, #fff, #b49fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .s-logout { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--muted); padding: 6px; border-radius: 8px; transition: all .2s; }
    .s-logout:hover { background: var(--surface-2); color: var(--red); }

    .search-wrap { padding: 12px 16px; }
    .search-input { width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 9px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color .2s; }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); opacity: .5; }

    .new-chat-btn { margin: 0 16px 12px; padding: 10px; background: linear-gradient(120deg, var(--accent), var(--accent-2)); border: none; border-radius: 10px; color: white; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity .2s; }
    .new-chat-btn:hover { opacity: .85; }

    .chats-list { flex: 1; overflow-y: auto; }
    .chats-list::-webkit-scrollbar { width: 4px; }
    .chats-list::-webkit-scrollbar-track { background: transparent; }
    .chats-list::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 99px; }

    .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; transition: background .15s; border-bottom: 1px solid var(--border); }
    .chat-item:hover { background: var(--surface-2); }
    .chat-item.active { background: rgba(124,111,255,.1); border-left: 2px solid var(--accent); }
    .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; color: white; flex-shrink: 0; }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-preview { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .chat-time { font-size: 11px; color: var(--muted); flex-shrink: 0; }
    .empty-chats { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 14px; }

    /* Main chat area */
    .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
    .chat-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--surface); }
    .chat-header-avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800; color: white; }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-weight: 600; font-size: 15px; }
    .chat-header-status { font-size: 12px; color: var(--green); margin-top: 1px; }

    .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 99px; }

    .no-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: var(--muted); }
    .no-chat-icon { width: 64px; height: 64px; border-radius: 20px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .no-chat p { font-size: 14px; }

    .msg-wrap { display: flex; flex-direction: column; max-width: 65%; }
    .msg-wrap.out { align-self: flex-end; align-items: flex-end; }
    .msg-wrap.in { align-self: flex-start; align-items: flex-start; }
    .msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-break: break-word; }
    .msg-wrap.out .msg-bubble { background: var(--msg-out); border-bottom-right-radius: 4px; }
    .msg-wrap.in .msg-bubble { background: var(--msg-in); border-bottom-left-radius: 4px; }
    .msg-time { font-size: 11px; color: var(--muted); margin-top: 3px; padding: 0 4px; }
    .msg-sender { font-size: 11px; color: var(--accent-2); margin-bottom: 3px; padding: 0 4px; font-weight: 500; }

    .typing-indicator { display: none; align-self: flex-start; background: var(--msg-in); padding: 12px 16px; border-radius: 16px; border-bottom-left-radius: 4px; gap: 4px; }
    .typing-indicator.show { display: flex; }
    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: typingDot 1.4s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes typingDot { 0%, 60%, 100% { transform: translateY(0); opacity: .4; } 30% { transform: translateY(-6px); opacity: 1; } }

    .input-area { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; background: var(--surface); }
    .msg-input { flex: 1; background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 11px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; resize: none; max-height: 120px; transition: border-color .2s; line-height: 1.4; }
    .msg-input:focus { border-color: var(--accent); }
    .msg-input::placeholder { color: var(--muted); opacity: .5; }
    .send-btn { width: 42px; height: 42px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; }
    .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(124,111,255,.5); }
    .send-btn:active { transform: scale(.95); }

    /* Modal - new chat */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px; width: 100%; max-width: 380px; box-shadow: 0 24px 64px rgba(0,0,0,.6); animation: slideUp .3s cubic-bezier(.16,1,.3,1); }
    .modal h3 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 20px; }
    .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
    .btn-ghost { flex: 1; padding: 11px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: all .2s; }
    .btn-ghost:hover { color: var(--text); background: var(--surface-3); }
    .btn-sm { flex: 1; padding: 11px; background: linear-gradient(120deg, var(--accent), var(--accent-2)); border: none; border-radius: 10px; color: white; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .2s; }
    .btn-sm:hover { opacity: .85; }

    .user-result { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--surface-2); border-radius: 10px; margin-top: 10px; cursor: pointer; transition: background .15s; border: 1px solid var(--border); }
    .user-result:hover { background: var(--surface-3); }
    .user-result .avatar { width: 36px; height: 36px; font-size: 13px; }
    .user-result-info { flex: 1; }
    .user-result-name { font-size: 14px; font-weight: 500; }
    .user-result-email { font-size: 12px; color: var(--muted); }

    /* Profile badge */
    .profile-badge { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .profile-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800; color: white; flex-shrink: 0; }
    .profile-info { flex: 1; min-width: 0; }
    .profile-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .profile-email { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .online-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; box-shadow: 0 0 6px var(--green); }

    /* ── Profile Modal ── */
    .profile-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 0; width: 100%; max-width: 360px; box-shadow: 0 24px 64px rgba(0,0,0,.7); animation: slideUp .3s cubic-bezier(.16,1,.3,1); overflow: hidden; }
    .profile-modal-header { position: relative; padding: 32px 28px 24px; background: linear-gradient(135deg, rgba(124,111,255,.2), rgba(56,189,248,.1)); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .profile-modal-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: white; box-shadow: 0 8px 24px rgba(124,111,255,.4); position: relative; cursor: pointer; overflow: hidden; }
    .profile-modal-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; position: absolute; inset: 0; }
    .avatar-upload-hint { position: absolute; inset: 0; border-radius: 50%; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; font-size: 22px; z-index: 1; }
    .profile-modal-avatar:hover .avatar-upload-hint { opacity: 1; }
    .profile-modal-name { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
    .profile-modal-email { font-size: 13px; color: var(--muted); }
    .profile-modal-body { padding: 24px 28px; display: flex; flex-direction: column; gap: 14px; }
    .profile-stat { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: var(--surface-2); border-radius: 12px; border: 1px solid var(--border); }
    .profile-stat-icon { width: 36px; height: 36px; border-radius: 10px; background: rgba(124,111,255,.15); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .profile-stat-info { flex: 1; }
    .profile-stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 500; }
    .profile-stat-value { font-size: 14px; font-weight: 500; margin-top: 2px; }
    .profile-modal-footer { padding: 0 28px 24px; display: flex; gap: 10px; }
    .btn-danger { flex: 1; padding: 11px; background: rgba(255,94,125,.1); border: 1px solid rgba(255,94,125,.2); border-radius: 10px; color: var(--red); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .2s; }
    .btn-danger:hover { background: rgba(255,94,125,.2); }
    .profile-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,.08); border: none; border-radius: 8px; width: 32px; height: 32px; cursor: pointer; color: var(--muted); display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .profile-close:hover { background: rgba(255,255,255,.15); color: var(--text); }
    #avatarFileInput { display: none; }

    @media (max-width: 640px) {
      .sidebar { width: 100%; min-width: unset; display: none; }
      .sidebar.mobile-show { display: flex; position: fixed; inset: 0; z-index: 50; }
      .chat-area { width: 100%; }
    }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-wrap">
    <div class="auth-brand">
      <div class="auth-logo">
        <img src="flick-logo.png" alt="Flick" onerror="this.parentElement.innerHTML='<div class=\'auth-logo-placeholder\'></div>'"/>
      </div>
      <span class="auth-title">Flick</span>
    </div>
    <div class="auth-card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab(0)">Войти</button>
        <button class="tab" onclick="switchTab(1)">Регистрация</button>
        <div class="tab-ind" id="tabInd"></div>
      </div>

      <form id="loginForm" class="form active" onsubmit="return false">
        <div class="field"><label>Email</label><input type="email" id="lEmail" placeholder="you@example.com"/></div>
        <div class="field"><label>Пароль</label><input type="password" id="lPass" placeholder="••••••••"/></div>
        <button class="btn btn-primary" onclick="login()"><span id="lBtnText">Войти</span><div class="spin" id="lSpin"></div></button>
      </form>

      <form id="regForm" class="form" onsubmit="return false">
        <div class="field"><label>Имя пользователя</label><input type="text" id="rName" placeholder="username"/></div>
        <div class="field"><label>Email</label><input type="email" id="rEmail" placeholder="you@example.com"/></div>
        <div class="field">
          <label>Пароль</label>
          <input type="password" id="rPass" placeholder="Минимум 6 символов" oninput="updateStrength(this.value)"/>
          <div class="strength-bar"><div class="strength-fill" id="sFill"></div></div>
        </div>
        <button class="btn btn-primary" onclick="register()"><span id="rBtnText">Создать аккаунт</span><div class="spin" id="rSpin"></div></button>
      </form>

      <div class="auth-msg" id="authMsg"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="s-logo">
        <img src="flick-logo.png" alt="" onerror="this.parentElement.innerHTML='<div class=\'s-logo-ph\'></div>'"/>
      </div>
      <span class="s-title">Flick</span>
      <button class="s-logout" onclick="logout()" title="Выйти">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
        </svg>
      </button>
    </div>

    <div class="search-wrap">
      <input class="search-input" placeholder="🔍  Поиск чатов..." id="searchInput" oninput="filterChats(this.value)"/>
    </div>

    <button class="new-chat-btn" onclick="showNewChatModal()">+ Новый чат</button>

    <div class="chats-list" id="chatsList">
      <div class="empty-chats">Нет диалогов.<br/>Начни новый чат!</div>
    </div>

    <div class="profile-badge" onclick="showProfileModal()" style="cursor:pointer;" title="Мой профиль">
      <div class="profile-avatar" id="profileAvatar">?</div>
      <div class="profile-info">
        <div class="profile-name" id="profileName">—</div>
        <div class="profile-email" id="profileEmail">—</div>
      </div>
      <div class="online-dot"></div>
    </div>
  </div>

  <!-- Chat area -->
  <div class="chat-area">
    <div id="noChatView" class="no-chat" style="display:flex;">
      <div class="no-chat-icon">💬</div>
      <p>Выбери чат или начни новый</p>
    </div>

    <div id="chatView" style="display:none; flex-direction:column; height:100%;">
      <div class="chat-header">
        <div class="chat-header-avatar" id="chatHeaderAvatar">?</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chatHeaderName">—</div>
          <div class="chat-header-status">в сети</div>
        </div>
      </div>

      <div class="messages-area" id="messagesArea">
        <div class="typing-indicator" id="typingIndicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>

      <div class="input-area">
        <textarea class="msg-input" id="msgInput" placeholder="Напишите сообщение..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Profile Modal -->
<div class="modal-overlay" id="profileModal">
  <div class="profile-modal">
    <div class="profile-modal-header">
      <button class="profile-close" onclick="hideProfileModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="profile-modal-avatar" onclick="document.getElementById('avatarFileInput').click()">
        <span id="profileModalInitial">?</span>
        <img id="profileModalImg" src="" style="display:none"/>
        <div class="avatar-upload-hint">📷</div>
      </div>
      <input type="file" id="avatarFileInput" accept="image/*" onchange="uploadAvatar(this)"/>
      <div class="profile-modal-name" id="profileModalName">—</div>
      <div class="profile-modal-email" id="profileModalEmail">—</div>
    </div>
    <div class="profile-modal-body">
      <div class="profile-stat">
        <div class="profile-stat-icon">👤</div>
        <div class="profile-stat-info">
          <div class="profile-stat-label">Имя пользователя</div>
          <div class="profile-stat-value" id="profileModalUsername">—</div>
        </div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-icon">📅</div>
        <div class="profile-stat-info">
          <div class="profile-stat-label">Дата регистрации</div>
          <div class="profile-stat-value" id="profileModalDate">—</div>
        </div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-icon">💬</div>
        <div class="profile-stat-info">
          <div class="profile-stat-label">Диалогов</div>
          <div class="profile-stat-value" id="profileModalChats">0</div>
        </div>
      </div>
    </div>
    <div class="profile-modal-footer">
      <button class="btn-danger" onclick="logout(); hideProfileModal()">Выйти из аккаунта</button>
      <button class="btn-sm" onclick="hideProfileModal()">Закрыть</button>
    </div>
  </div>
</div>

<!-- New Chat Modal -->
<div class="modal-overlay" id="newChatModal">
  <div class="modal">
    <h3>Новый чат</h3>
    <div class="field">
      <label>Email пользователя</label>
      <input type="email" id="searchEmail" placeholder="friend@example.com" oninput="searchUser(this.value)"/>
    </div>
    <div id="userResult"></div>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="hideNewChatModal()">Отмена</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Config ────────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyCQCTJ3S2-9pTBkN5aZEh5CQu1vUfYl7MU",
  authDomain:        "flick-messenger-d6494.firebaseapp.com",
  projectId:         "flick-messenger-d6494",
  storageBucket:     "flick-messenger-d6494.firebasestorage.app",
  messagingSenderId: "105311750186",
  appId:             "1:105311750186:web:539f413ec12f0cd42edb53"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── State ─────────────────────────────────────────────────────────────────────
let currentUser   = null;
let currentChatId = null;
let chatsData     = [];
let msgUnsubscribe = null;
let chatsUnsubscribe = null;

// ── Auth state ────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').classList.add('show');
    updateProfileBadge(user);
    await ensureUserDoc(user);
    listenChats();
  } else {
    currentUser = null;
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('appScreen').classList.remove('show');
    if (chatsUnsubscribe) chatsUnsubscribe();
  }
});

async function ensureUserDoc(user) {
  const ref = doc(db, 'users', user.uid);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      uid:       user.uid,
      email:     user.email,
      username:  user.displayName || user.email.split('@')[0],
      createdAt: serverTimestamp(),
    });
  }
}

function updateProfileBadge(user) {
  const name = user.displayName || user.email.split('@')[0];
  document.getElementById('profileName').textContent  = name;
  document.getElementById('profileEmail').textContent = user.email;
  document.getElementById('profileAvatar').textContent = name[0].toUpperCase();
}

// ── Login ─────────────────────────────────────────────────────────────────────
window.login = async () => {
  const email = document.getElementById('lEmail').value.trim();
  const pass  = document.getElementById('lPass').value;
  if (!email || !pass) return showMsg('Заполни все поля', 'err');
  setLoading('l', true);
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    showMsg(firebaseErr(e.code), 'err');
  } finally { setLoading('l', false); }
};

// ── Register ──────────────────────────────────────────────────────────────────
window.register = async () => {
  const name  = document.getElementById('rName').value.trim();
  const email = document.getElementById('rEmail').value.trim();
  const pass  = document.getElementById('rPass').value;
  if (!name || !email || !pass) return showMsg('Заполни все поля', 'err');
  if (pass.length < 6) return showMsg('Пароль минимум 6 символов', 'err');
  setLoading('r', true);
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
  } catch(e) {
    showMsg(firebaseErr(e.code), 'err');
  } finally { setLoading('r', false); }
};

// ── Logout ────────────────────────────────────────────────────────────────────
window.logout = () => signOut(auth);

// ── Chats listener ────────────────────────────────────────────────────────────
function listenChats() {
  const q = query(collection(db, 'chats'), where('members', 'array-contains', currentUser.uid), orderBy('updatedAt', 'desc'));
  chatsUnsubscribe = onSnapshot(q, snap => {
    chatsData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderChats(chatsData);
  });
}

function renderChats(chats) {
  const list = document.getElementById('chatsList');
  if (!chats.length) {
    list.innerHTML = '<div class="empty-chats">Нет диалогов.<br/>Начни новый чат!</div>';
    return;
  }
  list.innerHTML = chats.map(chat => {
    const otherId = chat.members.find(m => m !== currentUser.uid);
    const name    = chat.names?.[otherId] || 'Пользователь';
    const preview = chat.lastMessage || '';
    const time    = chat.updatedAt?.toDate ? formatTime(chat.updatedAt.toDate()) : '';
    const active  = chat.id === currentChatId ? 'active' : '';
    return `
      <div class="chat-item ${active}" onclick="openChat('${chat.id}', '${name}')">
        <div class="avatar">${name[0].toUpperCase()}</div>
        <div class="chat-info">
          <div class="chat-name">${name}</div>
          <div class="chat-preview">${preview}</div>
        </div>
        <div class="chat-time">${time}</div>
      </div>`;
  }).join('');
}

// ── Open chat ─────────────────────────────────────────────────────────────────
window.openChat = (chatId, name) => {
  currentChatId = chatId;
  document.getElementById('noChatView').style.display = 'none';
  document.getElementById('chatView').style.display   = 'flex';
  document.getElementById('chatHeaderName').textContent  = name;
  document.getElementById('chatHeaderAvatar').textContent = name[0].toUpperCase();
  renderChats(chatsData); // re-render to update active state
  listenMessages(chatId);
};

// ── Messages listener ─────────────────────────────────────────────────────────
function listenMessages(chatId) {
  if (msgUnsubscribe) msgUnsubscribe();
  const area = document.getElementById('messagesArea');
  const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('createdAt', 'asc'));
  msgUnsubscribe = onSnapshot(q, snap => {
    // Keep typing indicator
    const typing = document.getElementById('typingIndicator');
    area.innerHTML = '';
    area.appendChild(typing);
    snap.docs.forEach(d => {
      const msg = d.data();
      const isOut = msg.senderId === currentUser.uid;
      const time  = msg.createdAt?.toDate ? formatTime(msg.createdAt.toDate()) : '';
      const wrap  = document.createElement('div');
      wrap.className = `msg-wrap ${isOut ? 'out' : 'in'}`;
      wrap.innerHTML = `
        ${!isOut ? `<div class="msg-sender">${msg.senderName}</div>` : ''}
        <div class="msg-bubble">${escapeHtml(msg.text)}</div>
        <div class="msg-time">${time}</div>`;
      area.appendChild(wrap);
    });
    area.scrollTop = area.scrollHeight;
  });
}

// ── Send message ──────────────────────────────────────────────────────────────
window.sendMessage = async () => {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text || !currentChatId) return;
  input.value = '';
  input.style.height = '';

  const name = currentUser.displayName || currentUser.email.split('@')[0];
  await addDoc(collection(db, 'chats', currentChatId, 'messages'), {
    text,
    senderId:   currentUser.uid,
    senderName: name,
    createdAt:  serverTimestamp(),
  });
  await updateDoc(doc(db, 'chats', currentChatId), {
    lastMessage: text,
    updatedAt:   serverTimestamp(),
  });
};

window.handleKey = e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
};

window.autoResize = el => {
  el.style.height = '';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};

// ── Search user & new chat ────────────────────────────────────────────────────
window.showNewChatModal = () => {
  document.getElementById('newChatModal').classList.add('show');
  document.getElementById('searchEmail').value = '';
  document.getElementById('userResult').innerHTML = '';
};
window.hideNewChatModal = () => document.getElementById('newChatModal').classList.remove('show');

let searchTimeout;
window.searchUser = val => {
  clearTimeout(searchTimeout);
  if (!val || !val.includes('@')) { document.getElementById('userResult').innerHTML = ''; return; }
  searchTimeout = setTimeout(async () => {
    const q = query(collection(db, 'users'), where('email', '==', val.trim()));
    const snap = await getDocs(q);
    if (snap.empty) {
      document.getElementById('userResult').innerHTML = '<div style="color:var(--muted);font-size:13px;margin-top:8px;">Пользователь не найден</div>';
      return;
    }
    const user = snap.docs[0].data();
    if (user.uid === currentUser.uid) {
      document.getElementById('userResult').innerHTML = '<div style="color:var(--muted);font-size:13px;margin-top:8px;">Это ты 😄</div>';
      return;
    }
    document.getElementById('userResult').innerHTML = `
      <div class="user-result" onclick="startChat('${user.uid}', '${user.username}', '${user.email}')">
        <div class="avatar" style="width:36px;height:36px;font-size:13px;">${user.username[0].toUpperCase()}</div>
        <div class="user-result-info">
          <div class="user-result-name">${user.username}</div>
          <div class="user-result-email">${user.email}</div>
        </div>
      </div>`;
  }, 500);
};

window.startChat = async (otherUid, otherName, otherEmail) => {
  // Check if chat already exists
  const q = query(collection(db, 'chats'), where('members', 'array-contains', currentUser.uid));
  const snap = await getDocs(q);
  const existing = snap.docs.find(d => d.data().members.includes(otherUid));

  let chatId;
  const myName = currentUser.displayName || currentUser.email.split('@')[0];

  if (existing) {
    chatId = existing.id;
  } else {
    const ref = await addDoc(collection(db, 'chats'), {
      members:     [currentUser.uid, otherUid],
      names:       { [currentUser.uid]: myName, [otherUid]: otherName },
      lastMessage: '',
      updatedAt:   serverTimestamp(),
      createdAt:   serverTimestamp(),
    });
    chatId = ref.id;
  }

  hideNewChatModal();
  openChat(chatId, otherName);
};

// ── Profile Modal ─────────────────────────────────────────────────────────────
window.showProfileModal = async () => {
  if (!currentUser) return;
  const name  = currentUser.displayName || currentUser.email.split('@')[0];
  const email = currentUser.email;

  document.getElementById('profileModalName').textContent     = name;
  document.getElementById('profileModalEmail').textContent    = email;
  document.getElementById('profileModalUsername').textContent = name;
  document.getElementById('profileModalChats').textContent    = chatsData.length;

  // Avatar
  if (currentUser.photoURL) {
    document.getElementById('profileModalInitial').style.display = 'none';
    const img = document.getElementById('profileModalImg');
    img.src = currentUser.photoURL;
    img.style.display = 'block';
  } else {
    document.getElementById('profileModalInitial').textContent    = name[0].toUpperCase();
    document.getElementById('profileModalInitial').style.display  = 'flex';
    document.getElementById('profileModalImg').style.display      = 'none';
  }

  // Registration date from Firestore
  try {
    const snap = await getDoc(doc(db, 'users', currentUser.uid));
    if (snap.exists() && snap.data().createdAt) {
      const date = snap.data().createdAt.toDate();
      document.getElementById('profileModalDate').textContent = date.toLocaleDateString('ru', { day: 'numeric', month: 'long', year: 'numeric' });
    }
  } catch(e) {
    document.getElementById('profileModalDate').textContent = '—';
  }

  document.getElementById('profileModal').classList.add('show');
};

window.hideProfileModal = () => document.getElementById('profileModal').classList.remove('show');

// Avatar upload (base64 → Firestore)
window.uploadAvatar = async (input) => {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result;
    await updateProfile(auth.currentUser, { photoURL: base64 });
    await updateDoc(doc(db, 'users', currentUser.uid), { photoURL: base64 });
    // Update sidebar avatar
    document.getElementById('profileAvatar').innerHTML = `<img src="${base64}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`;
    // Update modal
    document.getElementById('profileModalInitial').style.display = 'none';
    const img = document.getElementById('profileModalImg');
    img.src = base64; img.style.display = 'block';
  };
  reader.readAsDataURL(file);
};


window.filterChats = val => {
  const filtered = chatsData.filter(c => {
    const otherId = c.members.find(m => m !== currentUser.uid);
    const name = c.names?.[otherId] || '';
    return name.toLowerCase().includes(val.toLowerCase());
  });
  renderChats(filtered);
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function formatTime(date) {
  const now = new Date();
  const isToday = date.toDateString() === now.toDateString();
  if (isToday) return date.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
  return date.toLocaleDateString('ru', { day: 'numeric', month: 'short' });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function firebaseErr(code) {
  const map = {
    'auth/user-not-found':       'Пользователь не найден',
    'auth/wrong-password':       'Неверный пароль',
    'auth/email-already-in-use': 'Email уже используется',
    'auth/invalid-email':        'Некорректный email',
    'auth/weak-password':        'Слишком слабый пароль',
    'auth/too-many-requests':    'Слишком много попыток',
    'auth/invalid-credential':   'Неверный email или пароль',
  };
  return map[code] || `Ошибка: ${code}`;
}

function showMsg(text, type) {
  const el = document.getElementById('authMsg');
  el.textContent = text;
  el.className = `auth-msg ${type}`;
}

function setLoading(prefix, on) {
  document.getElementById(prefix + 'BtnText').style.opacity = on ? '0' : '1';
  document.getElementById(prefix + 'Spin').style.display    = on ? 'block' : 'none';
  document.querySelector(`#${prefix === 'l' ? 'loginForm' : 'regForm'} .btn`).disabled = on;
}
</script>

<script>
// UI helpers (non-module)
function switchTab(i) {
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', i===j));
  document.querySelectorAll('.form').forEach((f,j) => f.classList.toggle('active', i===j));
  document.getElementById('tabInd').classList.toggle('r', i===1);
  document.getElementById('authMsg').className = 'auth-msg';
}

function updateStrength(val) {
  let s = 0;
  if (val.length >= 6) s++;
  if (val.length >= 10) s++;
  if (/[A-Z]/.test(val)) s++;
  if (/[0-9]/.test(val)) s++;
  if (/[^a-zA-Z0-9]/.test(val)) s++;
  const map = [{w:'0%',c:'transparent'},{w:'25%',c:'#ff5e7d'},{w:'50%',c:'#fbbf24'},{w:'75%',c:'#60a5fa'},{w:'90%',c:'#34d399'},{w:'100%',c:'#34d399'}];
  document.getElementById('sFill').style.width = map[s].w;
  document.getElementById('sFill').style.background = map[s].c;
}

document.getElementById('profileModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) hideProfileModal();
});

// Close modal on overlay click
document.getElementById('newChatModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) hideNewChatModal();
});
</script>

</body>
</html>
