name: flick
description: Flick Messenger
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  hive_flutter: ^1.1.0
  flutter_blue_plus: ^2.2.1
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  permission_handler: ^11.3.1
  intl: ^0.19.0
  uuid: ^4.4.0
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0
  firebase_messaging: ^15.2.0
  flutter_webrtc: ^0.13.0
  record: ^6.0.0
  http: ^1.2.0
  crypto: ^3.0.3
  audioplayers: ^6.0.0
  firebase_database: ^11.3.0
  emoji_picker_flutter: ^4.4.0
  flutter_launcher_icons: ^0.13.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/icon_default.png"
  min_sdk_android: 23
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/icons/icon_default.png"
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/stickers/
    - assets/icons/
  fonts:
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne-Bold.ttf
          weight: 700
        - asset: assets/fonts/Syne-ExtraBold.ttf
          weight: 800
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf